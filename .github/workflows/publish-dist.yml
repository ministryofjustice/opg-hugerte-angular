name: Build and Publish Dist

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build dist using Docker + Makefile
        run: make build-dist

      - name: Checkout dist repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ministryofjustice/opg-hugerte-angular-dist
          token: ${{ secrets.GH_TOKEN }}
          path: dist-repo

      - name: Copy built dist into dist repo
        run: |
          rm -rf dist-repo/*
          cp -r dist/hugerte-angular/* dist-repo/

      - name: Create Pull Request in dist repo
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: dist-repo
          commit-message: "Update dist for release ${{ github.ref_name }}"
          branch: update-dist-${{ github.ref_name }}
          title: "Update dist for release ${{ github.ref_name }}"
          body: |
            Automated PR to update the dist package.
            Release version: ${{ github.ref_name }}
            Source commit: ${{ github.sha }}
          base: main

      - name: Tag release in dist repo (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd dist-repo
          TAG=${GITHUB_REF#refs/tags/}
          git tag $TAG
          git push origin $TAG
